<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>우리 결혼 준비 — 청실홍실</title>
<style>
  @import url('https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap');

  :root{
    --paper:#FAF9F6; --card:#FFFFFF; --ink:#26262E; --sub:#75716A; --faint:#A6A29A;
    --line:#E8E4DC; --blue:#27427A; --blue-soft:#E9EEF7; --red:#B5424E; --red-soft:#F8ECEB;
    --gold:#8A6D3B; --danger:#A33030;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Pretendard Variable', Pretendard, -apple-system, 'Apple SD Gothic Neo', sans-serif;
    font-size:14px; line-height:1.5; overflow-x:hidden;
  }
  .wrap{ max-width:720px; margin:0 auto; padding:0 16px 96px; }
  button{ font-family:inherit; cursor:pointer; }
  input, textarea{ font-family:inherit; font-size:14px; padding:10px 12px; border:1px solid var(--line);
    border-radius:10px; background:#fff; color:var(--ink); width:100%; outline:none; }
  input:focus, textarea:focus{ border-color:var(--blue); }
  ::placeholder{ color:var(--faint); }
  button:focus-visible, input:focus-visible, textarea:focus-visible{ outline:2px solid var(--blue); outline-offset:2px; }
  a{ color:var(--blue); }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }

  /* 헤더 */
  header{ padding:28px 4px 18px; display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  .eyebrow{ font-size:12px; letter-spacing:.18em; color:var(--gold); font-weight:700; }
  h1{ margin:4px 0 0; font-family:'Gowun Batang', serif; font-size:26px; font-weight:700; letter-spacing:-.01em; }
  .dday{ text-align:right; }
  .dday b{ font-family:'Gowun Batang', serif; font-size:24px; font-weight:700; color:var(--red); display:block; }
  .dday span{ font-size:11px; color:var(--faint); }

  /* 탭 바 */
  nav.tabbar{ display:flex; gap:8px; overflow-x:auto; padding:2px 2px 14px; position:sticky; top:0;
    background:var(--paper); z-index:5; scrollbar-width:none; }
  nav.tabbar::-webkit-scrollbar{ display:none; }
  .tab{ flex-shrink:0; font-size:13px; font-weight:500; padding:8px 14px; border-radius:999px;
    border:1px solid var(--line); background:#fff; color:var(--ink); display:flex; align-items:center; gap:6px; transition:all .15s; }
  .tab.active{ background:var(--ink); color:#fff; border-color:var(--ink); font-weight:700; }
  .tab.muted{ color:var(--faint); }
  .tab .dot{ width:6px; height:6px; border-radius:99px; }
  .tab.active .dot{ background:#fff !important; }

  /* 카드 공통 */
  .grid{ display:grid; gap:14px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px 20px; }
  .row{ display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
  .label{ font-size:12px; color:var(--sub); font-weight:600; }

  /* 써머리 */
  .total{ font-family:'Gowun Batang', serif; font-size:28px; font-weight:700; color:var(--blue); }
  .pend{ font-size:15px; font-weight:600; color:var(--red); }
  .grand{ font-size:15px; font-weight:700; }
  .divider{ border-top:1px dashed var(--line); margin-top:12px; padding-top:12px; }
  .thread-meta{ display:flex; justify-content:space-between; font-size:11px; color:var(--faint); margin-top:4px; }
  h2.sec{ margin:6px 4px 2px; font-size:13px; font-weight:700; color:var(--sub); letter-spacing:.04em; }
  .catrow{ width:100%; text-align:left; background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:13px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .catrow .name{ font-size:14px; font-weight:700; }
  .catrow .desc{ font-size:12px; color:var(--sub); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60vw; }
  .catrow .amt{ font-weight:700; color:var(--blue); font-size:14px; white-space:nowrap; }
  .catrow .warn{ font-size:11px; color:var(--danger); margin-top:2px; }

  /* 배지·칩 */
  .badge{ font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; white-space:nowrap; border:1px solid var(--line); }
  .chip{ font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; border:1px solid var(--line);
    background:#fff; color:var(--faint); transition:all .15s; }
  .st-candidate{ background:#F1EFEA; color:var(--sub); border-color:var(--line); }
  .st-considering{ background:var(--red-soft); color:var(--red); border-color:#E7C9CC; }
  .st-decided{ background:var(--blue); color:#fff; border-color:var(--blue); }
  .st-dropped{ background:#F5F4F1; color:var(--faint); border-color:var(--line); }

  /* 옵션 카드 */
  .opt{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:15px 16px; cursor:pointer; min-width:0; }
  .opt.decided{ border-color:var(--blue); box-shadow:0 2px 12px rgba(39,66,122,.09); }
  .opt.dropped{ opacity:.55; }
  .opt .nm{ font-size:15px; font-weight:700; overflow-wrap:anywhere; }
  .opt.dropped .nm{ text-decoration:line-through; }
  .opt .pr{ font-size:15px; font-weight:600; margin-top:2px; }
  .opt.decided .pr{ color:var(--blue); }
  .opt .memo{ margin:10px 0 0; font-size:13px; color:var(--sub); line-height:1.55; white-space:pre-wrap;
    overflow-wrap:anywhere; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .opt .actions{ display:flex; gap:6px; margin-top:12px; flex-wrap:wrap; align-items:center; }
  .opt .actions .spacer{ margin-left:auto; display:flex; gap:4px; }
  .txtbtn{ font-size:12px; color:var(--sub); background:none; border:none; padding:4px 6px; }
  .txtbtn.faint{ color:var(--faint); }
  .opt a{ overflow-wrap:anywhere; }
  .catrow .desc{ overflow-wrap:anywhere; }

  /* 옵션 상세 보기 */
  #detail{ position:fixed; inset:0; background:var(--paper); z-index:90; display:none; overflow-y:auto;
    -webkit-overflow-scrolling:touch; }
  #detail .inner{ max-width:720px; margin:0 auto; padding:0 16px 80px; }
  .dt-top{ display:flex; justify-content:space-between; align-items:center; padding:14px 0 10px;
    position:sticky; top:0; background:var(--paper); z-index:2; }
  .dt-back{ font-size:14px; font-weight:600; background:none; border:none; color:var(--sub); padding:6px 8px 6px 0; }
  .dt-name{ font-family:'Gowun Batang', serif; font-size:24px; font-weight:700; margin:6px 0 4px; overflow-wrap:anywhere; }
  .dt-cat{ font-size:12px; color:var(--gold); font-weight:700; letter-spacing:.06em; }
  .dt-price{ font-size:20px; font-weight:700; color:var(--blue); }
  .dt-chips{ display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
  .dt-memo{ font-size:15px; line-height:1.75; color:var(--ink); white-space:pre-wrap; overflow-wrap:anywhere;
    margin-top:18px; padding-top:16px; border-top:1px solid var(--line); }
  .dt-photos{ display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-top:18px; }
  .dt-photos img{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:10px;
    border:1px solid var(--line); cursor:pointer; background:#F1EFEA; }
  .dt-actions{ display:flex; gap:8px; margin-top:24px; flex-wrap:wrap; }

  /* 폼 */
  .form{ background:var(--blue-soft); border:1px solid rgba(39,66,122,.14); border-radius:16px; padding:18px; display:grid; gap:10px; }
  .form .title{ font-size:13px; font-weight:700; color:var(--blue); }
  .form .btns{ display:flex; gap:8px; justify-content:flex-end; }
  .btn-ghost{ font-size:13px; padding:9px 16px; border-radius:10px; border:1px solid var(--line); background:#fff; color:var(--sub); }
  .btn-primary{ font-size:13px; font-weight:700; padding:9px 18px; border-radius:10px; border:none; background:var(--blue); color:#fff; }
  .add-opt{ font-size:14px; font-weight:600; padding:13px; border-radius:14px; border:1.5px dashed rgba(39,66,122,.4);
    background:#fff; color:var(--blue); width:100%; }
  .empty{ text-align:center; padding:36px 0; color:var(--faint); font-size:13px; }

  /* 일정 */
  .sched-toggle{ display:flex; gap:6px; }
  .sched-toggle button{ flex:1; font-size:13px; font-weight:600; padding:9px; border-radius:10px;
    border:1px solid var(--line); background:#fff; color:var(--sub); }
  .sched-toggle button.on{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .cal-title{ font-family:'Gowun Batang', serif; font-size:17px; font-weight:700; }
  .cal-nav{ background:none; border:none; font-size:16px; color:var(--sub); padding:6px 12px; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7, 1fr); gap:2px; }
  .cal-dow{ text-align:center; font-size:11px; color:var(--faint); padding:4px 0 6px; font-weight:600; }
  .cal-cell{ aspect-ratio:1/1; border:none; background:none; border-radius:10px; display:flex;
    flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:13px; color:var(--ink); }
  .cal-cell.dim{ opacity:.35; }
  .cal-cell.today{ font-weight:800; color:var(--blue); }
  .cal-cell.sel{ background:var(--blue-soft); }
  .cal-cell.wed{ box-shadow:inset 0 0 0 1.5px var(--red); }
  .cal-cell.sun{ color:var(--red); }
  .cal-dots{ display:flex; gap:2px; height:4px; }
  .cal-dots i{ width:4px; height:4px; border-radius:99px; background:var(--blue); }
  .tl-date{ font-size:12px; font-weight:700; color:var(--sub); margin:16px 4px 6px;
    display:flex; justify-content:space-between; align-items:baseline; }
  .tl-dd{ color:var(--red); font-weight:700; }
  .ev{ display:flex; gap:10px; align-items:flex-start; background:var(--card); border:1px solid var(--line);

  .ev.done{ opacity:.5; }
  .ev.wedday{ border-color:var(--red); background:var(--red-soft); }
  .ev .body{ min-width:0; flex:1; cursor:pointer; }
  .ev .t{ font-size:12px; color:var(--sub); font-weight:600; }
  .ev .tt{ font-size:14px; font-weight:700; overflow-wrap:anywhere; }
  .ev.done .tt{ text-decoration:line-through; }
  .ev .mm{ font-size:12px; color:var(--sub); margin-top:2px; overflow-wrap:anywhere; white-space:pre-wrap; }
  .ev-check{ width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line); background:#fff;

    font-size:12px; color:#fff; padding:0; }
  .ev-check.on{ background:var(--blue); border-color:var(--blue); }
  .taglink{ background:none; border:none; padding:0; font:inherit; font-weight:700;
    color:var(--blue); text-decoration:underline; cursor:pointer; overflow-wrap:anywhere; }
  .tagrow{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; align-items:center; }
  .tagrow::-webkit-scrollbar{ display:none; }
  .tagrow .chip{ flex-shrink:0; }

  /* 순서 변경 */
  #reorder{ position:fixed; inset:0; background:var(--paper); z-index:95; display:none; overflow-y:auto;
    -webkit-overflow-scrolling:touch; }
  #reorder .inner{ max-width:720px; margin:0 auto; padding:0 16px 60px; }
  .ro-row{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line);

  .ro-row.dragging{ opacity:.9; box-shadow:0 8px 20px rgba(0,0,0,.14); position:relative; z-index:2;

  .ro-handle{ font-size:17px; color:var(--faint); touch-action:none; cursor:grab; padding:6px 10px; margin-left:-6px; }
  .ro-name{ font-size:14px; font-weight:700; flex:1; overflow-wrap:anywhere; }
  .ro-btn{ background:#fff; border:1px solid var(--line); border-radius:8px; font-size:14px;
    color:var(--sub); padding:6px 12px; }

  /* 사진 */
  .thumbs{ display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .thumb{ width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line);
    cursor:pointer; background:#F1EFEA; }
  #lightbox{ position:fixed; inset:0; background:rgba(20,20,24,.93); z-index:200; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:14px; padding:20px; }
  #lightbox img{ max-width:100%; max-height:78vh; border-radius:10px; }
  #lb-del{ font-size:13px; padding:8px 16px; border-radius:999px; border:1px solid rgba(255,255,255,.4);
    background:none; color:#fff; }

  /* 핀번호 게이트 */
  #gate{ position:fixed; inset:0; background:var(--paper); z-index:100; display:none;
    align-items:center; justify-content:center; padding:24px; }
  .gate-card{ width:100%; max-width:320px; text-align:center; }
  .gate-card .eyebrow{ margin-bottom:2px; }
  .gate-card h2{ margin:4px 0 20px; font-family:'Gowun Batang', serif; font-size:22px; font-weight:700; }
  #pin-input{ text-align:center; font-size:22px; letter-spacing:.5em; padding:12px; }
  #pin-btn{ width:100%; margin-top:10px; font-size:14px; font-weight:700; padding:12px;
    border-radius:12px; border:none; background:var(--blue); color:#fff; }
  #pin-err{ font-size:12px; color:var(--danger); margin-top:10px; min-height:16px; }

  /* 토스트 */
  #toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:10px 18px; border-radius:999px; font-size:13px; z-index:50; display:none; }
</style>

<style id="mode-switch-css">
  #modeHoneymoon{ display:none; }
  #modeHoneymoon.on{ display:block; }
  #modeHoneymoon iframe{ width:100%; height:100vh; border:0; display:block; background:#faf7f2; }
  #modeSwitch{ position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:60;
    display:flex; gap:4px; background:rgba(255,255,255,.92); backdrop-filter:blur(8px);

  body.hm-active{ overflow:hidden; }
</style>

<script>

const FIREBASE_CONFIG = {

async function sha256hex(s){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* ── 사진 저장 ──
   사진은 본문 데이터와 분리 저장해서, 목록 동기화가 무거워지지 않게 합니다. */
let fbPhotos = null;
const photoCache = {};
const MAX_PHOTOS_PER_OPTION = 4;

async function photoGet(id){
  if (photoCache[id]) return photoCache[id];
  if (fbPhotos){
    try { const s = await fbPhotos.child(id).get(); const v = s.exists() ? s.val() : null;
      if (v) photoCache[id] = v; return v; } catch(e){ return null; }
  }
  return (state.photos || {})[id] || null;
}
async function photoSet(id, data){
  photoCache[id] = data;
  if (fbPhotos){ try { await fbPhotos.child(id).set(data); return true; } catch(e){ return false; } }
  state.photos = state.photos || {}; state.photos[id] = data; return true;
}
async function photoDel(id){
  delete photoCache[id];
  if (fbPhotos){ try { await fbPhotos.child(id).remove(); } catch(e){} }
  if (state.photos) delete state.photos[id];
}
function resizeImage(file, maxDim, quality){
  return new Promise((res, rej)=>{
    const r = new FileReader();
    r.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        const m = Math.max(w, h);
        if (m > maxDim){ const k = maxDim / m; w = Math.round(w*k); h = Math.round(h*k); }
        const cv = document.createElement("canvas");
        cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, 0, 0, w, h);
        res(cv.toDataURL("image/jpeg", quality));
      };
      img.onerror = rej;
      img.src = r.result;
    };
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
async function hydratePhotos(){
  const imgs = document.querySelectorAll("img[data-pid]");
  for (const el of imgs){
    const src = await photoGet(el.getAttribute("data-pid"));
    if (src) el.src = src;
  }
}

const STATUS = {
  candidate:  { label:"후보" },
  considering:{ label:"고민중" },
  decided:    { label:"결정" },

};
const ORDER = ["candidate","considering","decided","dropped"];

const DEFAULT_NAMES = ["식장","반지·예물","스튜디오","드레스","메이크업","자동차","신혼여행","집 인테리어","가전","청첩장","청모","혼주 예복·한복"];

const uid = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");

const fmtWon = (n) => {
  if (n == null || isNaN(n)) return "—";
  if (n >= 100000000){
    const eok = Math.floor(n/100000000), man = Math.round((n%100000000)/10000);
    return man > 0 ? eok + "억 " + man.toLocaleString() + "만원" : eok + "억원";
  }
  if (n >= 10000 && n % 10000 === 0) return (n/10000).toLocaleString() + "만원";
  if (n >= 10000) return (n/10000).toLocaleString(undefined,{maximumFractionDigits:1}) + "만원";
  return n.toLocaleString() + "원";
};
const parsePrice = (s) => { const d = String(s).replace(/[^\d]/g,""); return d ? parseInt(d,10) : null; };
const withCommas = (s) => { const d = String(s).replace(/[^\d]/g,""); return d ? parseInt(d,10).toLocaleString() : ""; };

/* ── 저장 어댑터 (Firebase → 아티팩트 → localStorage 순) ── */
const store = {
  async get(k){
    if (fbRef){
      try { const snap = await fbRef.get(); return snap.exists() ? snap.val() : null; } catch(e){ console.error(e); return null; }
    }
    if (typeof window.storage !== "undefined" && window.storage?.get){
      try { const r = await window.storage.get(k); return r?.value ?? null; } catch(e){ return null; }
    }
    try { return localStorage.getItem(k); } catch(e){ return null; }
  },
  async set(k,v){
    if (fbRef){
      try { lastWritten = v; await fbRef.set(v); return true; } catch(e){ console.error(e); return false; }
    }
    if (typeof window.storage !== "undefined" && window.storage?.set){
      try { await window.storage.set(k,v); return true; } catch(e){ /* fallthrough */ }
    }
    try { localStorage.setItem(k,v); return true; } catch(e){ return false; }
  }
};

/* ── 계산 ── */
function calc(){
  const rows = state.categories.map(c=>{
    const decided = c.options.filter(o=>o.status==="decided");
    const pending = c.options.filter(o=>o.status==="candidate"||o.status==="considering");
    const decidedSum = decided.reduce((s,o)=>s+(o.price||0),0);
    const prices = pending.map(o=>o.price).filter(p=>p!=null);
    return { cat:c, decided, pending, decidedSum,
      min: prices.length?Math.min(...prices):null,
      max: prices.length?Math.max(...prices):null,
      over: c.budgetCap!=null && decidedSum>c.budgetCap };
  });
  const confirmed = rows.reduce((s,r)=>s+r.decidedSum,0);
  const open = rows.filter(r=>r.decided.length===0 && r.pending.length>0);
  return {
    rows, confirmed,
    pendMin: open.reduce((s,r)=>s+(r.min||0),0),
    pendMax: open.reduce((s,r)=>s+(r.max||0),0),
    activeCats: rows.filter(r=>r.decided.length>0||r.pending.length>0),
    doneCats: rows.filter(r=>r.decided.length>0),
  };
}

function renderHeader(){
  const el = document.getElementById("dday");
  if (!state.weddingDate){ el.innerHTML = ""; return; }
  const diff = Math.ceil((new Date(state.weddingDate+"T00:00:00") - new Date().setHours(0,0,0,0)) / 86400000);
  const label = diff > 0 ? "D-"+diff : diff === 0 ? "D-Day" : "D+"+(-diff);
  el.innerHTML = '<b>'+label+'</b><span>'+esc(state.weddingDate)+'</span>';
}

function renderTabs(){
  const bar = document.getElementById("tabbar");
  let html = '<button class="tab'+(tab==="summary"?" active":"")+'" onclick="App.setTab(\'summary\')">Summary</button>';
  html += '<button class="tab'+(tab==="schedule"?" active":"")+'" onclick="App.setTab(\'schedule\')">일정</button>';
  for (const c of state.categories){
    const hasD = c.options.some(o=>o.status==="decided");
    const hasP = c.options.some(o=>o.status==="considering"||o.status==="candidate");
    const dot = hasD ? "var(--blue)" : hasP ? "var(--red)" : null;
    html += '<button class="tab'+(tab===c.id?" active":"")+'" onclick="App.tabClick(\''+c.id+'\')"'
          + ' onpointerdown="App.lpStart()" onpointerup="App.lpEnd()" onpointerleave="App.lpEnd()" onpointercancel="App.lpEnd()">'
          + (dot ? '<span class="dot" style="background:'+dot+'"></span>' : '')
          + esc(c.name) + '</button>';
  }
  html += '<button class="tab muted" onclick="App.addCategory()">＋ 항목</button>';
  bar.innerHTML = html;
}

function threadsSVG(pct){
  const p = Math.max(0, Math.min(100, pct));
  const blue = "M4 14 C 40 14, 40 6, 76 6 S 112 14, 148 14 S 184 6, 220 6 S 256 14, 292 14";
  const red  = "M4 6 C 40 6, 40 14, 76 14 S 112 6, 148 6 S 184 14, 220 14 S 256 6, 292 6";
  return '<svg viewBox="0 0 296 20" style="width:100%;height:22px;display:block" aria-hidden="true">'
    + '<path d="'+red+'" fill="none" stroke="var(--line)" stroke-width="2" stroke-linecap="round"/>'
    + '<path d="'+blue+'" fill="none" stroke="var(--line)" stroke-width="2" stroke-linecap="round"/>'
    + '<path d="'+red+'" fill="none" stroke="var(--red)" stroke-width="2.4" stroke-linecap="round" pathLength="100" stroke-dasharray="'+p+' 100" style="transition:stroke-dasharray .6s ease"/>'
    + '<path d="'+blue+'" fill="none" stroke="var(--blue)" stroke-width="2.4" stroke-linecap="round" pathLength="100" stroke-dasharray="'+p+' 100" style="transition:stroke-dasharray .6s ease"/>'
    + '</svg>';
}

/* ── 옵션 태그(#) ──
   일정 제목/메모에 #옵션이름 을 쓰면 링크가 되고, 누르면 해당 옵션 상세가 열립니다. */
let evTagList = [];

function optionIndex(){
  const list = [];
  for (const c of state.categories)
    for (const o of c.options)
      if (o.name) list.push({ name: o.name, catId: c.id, optId: o.id });
  return list.sort((a,b)=>b.name.length - a.name.length); // 긴 이름 우선 매칭
}

function renderWithTags(text){
  const idx = optionIndex();
  let out = "", i = 0;
  while (i < text.length){
    if (text[i] === "#"){
      const rest = text.slice(i+1);
      let hit = null;
      for (const it of idx){ if (rest.startsWith(it.name)){ hit = it; break; } }
      if (hit){
        out += '<button class="taglink" onclick="event.stopPropagation();App.openDetail(\''+hit.catId+'\',\''+hit.optId+'\')">#'+esc(hit.name)+'</button>';
        i += 1 + hit.name.length;
        continue;
      }
    }
    out += esc(text[i]);
    i++;
  }
  return out;
}

function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
const DOW = ["일","월","화","수","목","금","토"];
function fmtDateK(ds){
  const d = new Date(ds+"T00:00:00");
  return (d.getMonth()+1)+"월 "+d.getDate()+"일 ("+DOW[d.getDay()]+")";
}
function ddayOf(ds){
  return Math.ceil((new Date(ds+"T00:00:00") - new Date().setHours(0,0,0,0)) / 86400000);
}
function ddayLabel(ds){
  const n = ddayOf(ds);
  return n > 0 ? "D-"+n : n === 0 ? "오늘" : "D+"+(-n);
}
function allEvents(){
  const evs = (state.events || []).slice();
  if (state.weddingDate) evs.push({ id:"__wed", date: state.weddingDate, time:"", title:"💒 예식일", memo:"", fixed:true });
  return evs.sort((a,b)=> a.date===b.date ? (a.time||"99:99").localeCompare(b.time||"99:99") : a.date.localeCompare(b.date));
}

  let html = '<section class="card" style="padding:16px">'
    + '<div class="cal-head">'
    + '<button class="cal-nav" onclick="App.calMove(-1)">◀</button>'
    + '<div class="cal-title">'+y+'년 '+(m+1)+'월</div>'
    + '<button class="cal-nav" onclick="App.calMove(1)">▶</button>'
    + '</div><div class="cal-grid">';
  for (let i=0;i<7;i++) html += '<div class="cal-dow"'+(i===0?' style="color:var(--red)"':'')+'>'+DOW[i]+'</div>';
  for (let i=0;i<startDow;i++) html += '<div></div>';
  for (let d=1; d<=daysIn; d++){
    const ds = y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
    const dow = (startDow + d - 1) % 7;
    const list = byDate[ds] || [];
    let cls = "cal-cell";
    if (dow===0) cls += " sun";
    if (ds===today) cls += " today";
    if (ds===selDate) cls += " sel";
    if (ds===state.weddingDate) cls += " wed";
    let dots = '<span class="cal-dots">';
    for (let i=0;i<Math.min(list.length,3);i++) dots += '<i'+(list[i].fixed?' style="background:var(--red)"':'')+'></i>';
    dots += '</span>';
    html += '<button class="'+cls+'" onclick="App.calSelect(\''+ds+'\')">'+d+dots+'</button>';
  }
  html += '</div></section>';

  const list = byDate[selDate] || [];
  html += '<div><div class="tl-date"><span>'+fmtDateK(selDate)+'</span><span class="tl-dd">'+ddayLabel(selDate)+'</span></div>';
  if (!list.length) html += '<div class="empty" style="padding:14px 0">이 날은 일정이 없어요</div>';
  for (const e of list) html += evRowHTML(e);
  html += '</div>';
  return html;
}

function timelineHTML(){
  const today = todayStr();
  const evs = allEvents();
  if (!evs.length) return '<div class="empty">등록된 일정이 없어요. 위 버튼으로 추가해 보세요.</div>';
  const upcoming = evs.filter(e=>e.date >= today);
  const past = evs.filter(e=>e.date < today).reverse();
  let html = '<div>';
  let lastDate = null;
  for (const e of upcoming){
    if (e.date !== lastDate){
      html += '<div class="tl-date"><span>'+fmtDateK(e.date)+'</span><span class="tl-dd">'+ddayLabel(e.date)+'</span></div>';
      lastDate = e.date;
    }
    html += evRowHTML(e);
  }
  if (!upcoming.length) html += '<div class="empty" style="padding:14px 0">다가오는 일정이 없어요</div>';
  if (past.length){
    html += '<h2 class="sec" style="margin-top:24px">지난 일정</h2>';
    lastDate = null;
    for (const e of past){
      if (e.date !== lastDate){
        html += '<div class="tl-date" style="opacity:.7"><span>'+fmtDateK(e.date)+'</span><span style="color:var(--faint)">'+ddayLabel(e.date)+'</span></div>';
        lastDate = e.date;
      }
      html += evRowHTML(e, true);
    }
  }
  html += '</div>';
  return html;
}

function evRowHTML(e, pastSection){
  if (e.fixed){
    return '<div class="ev wedday"><div class="body" style="cursor:default">'
      + '<div class="tt" style="color:var(--red)">'+esc(e.title)+'</div></div></div>';
  }
  return '<div class="ev'+(e.done?' done':'')+'"'+(pastSection?' style="opacity:.6"':'')+'>'
    + '<button class="ev-check'+(e.done?' on':'')+'" onclick="App.evToggle(\''+e.id+'\')">'+(e.done?'✓':'')+'</button>'
    + '<div class="body" onclick="if(!event.target.closest(\'.taglink\'))App.evOpenForm(null,\''+e.id+'\')">'
    + (e.time ? '<div class="t">'+esc(e.time)+'</div>' : '')
    + '<div class="tt">'+renderWithTags(e.title)+'</div>'
    + (e.memo ? '<div class="mm">'+renderWithTags(e.memo)+'</div>' : '')
    + '</div></div>';
}

/* ── 항목 순서 변경 ── */
let reorderMode = false;

function renderReorder(){
  const box = document.getElementById("reorder");
  if (!reorderMode){ box.style.display = "none"; return; }
  let html = '<div class="dt-top"><button class="dt-back" onclick="App.reorderDone()">✓ 완료</button>'
    + '<span class="label" style="font-size:13px">항목 순서 변경</span></div>'
    + '<div style="font-size:12px;color:var(--faint);margin:0 0 12px">⠿ 를 누른 채 위아래로 끌거나, 화살표를 눌러 옮기세요</div>';
  const n = state.categories.length;
  state.categories.forEach((c, i)=>{
    html += '<div class="ro-row" data-id="'+c.id+'">'
      + '<span class="ro-handle" onpointerdown="App.roDown(event,\''+c.id+'\')" onpointermove="App.roDrag(event)" onpointerup="App.roUp(event)" onpointercancel="App.roUp(event)">⠿</span>'
      + '<span class="ro-name">'+esc(c.name)+'</span>'
      + '<button class="ro-btn"'+(i===0?' disabled style="opacity:.3"':'')+' onclick="App.roMove(\''+c.id+'\',-1)">↑</button>'
      + '<button class="ro-btn"'+(i===n-1?' disabled style="opacity:.3"':'')+' onclick="App.roMove(\''+c.id+'\',1)">↓</button>'
      + '</div>';
  });
  document.getElementById("reorder-inner").innerHTML = html;
  box.style.display = "block";
}

/* ── 옵션 상세 보기 ── */
let detailState = null;

function renderDetail(){
  const box = document.getElementById("detail");
  if (!detailState){ box.style.display = "none"; return; }
  const c = state.categories.find(x=>x.id===detailState.catId);
  const o = c ? c.options.find(x=>x.id===detailState.optId) : null;
  if (!o){ detailState = null; box.style.display = "none"; return; }

  let html = '<div class="dt-top"><button class="dt-back" onclick="App.closeDetail()">← 목록으로</button>'
    + badgeHTML(o.status) + '</div>'
    + '<div class="dt-cat">'+esc(c.name)+'</div>'
    + '<div class="dt-name"'+(o.status==="dropped"?' style="text-decoration:line-through;color:var(--faint)"':'')+'>'+esc(o.name)+'</div>'
    + '<div class="dt-price">'+(o.price!=null ? fmtWon(o.price) : '<span style="color:var(--faint);font-size:14px;font-weight:500">금액 미입력</span>')+'</div>';

  html += '<div class="dt-chips">';
  for (const s of ORDER){
    const on = o.status === s;
    html += '<button class="chip'+(on?' st-'+s:'')+'" style="font-size:12px;padding:5px 12px" onclick="App.setStatus(\''+c.id+'\',\''+o.id+'\',\''+s+'\')">'+STATUS[s].label+'</button>';
  }
  html += '</div>';

  if (o.link){
    const href = /^https?:\/\//.test(o.link) ? o.link : 'https://'+o.link;
    html += '<a href="'+esc(href)+'" target="_blank" rel="noreferrer" style="display:inline-block;margin-top:14px;font-size:13px;font-weight:600">링크 열기 ↗</a>';
  }

  if (o.memo) html += '<div class="dt-memo">'+esc(o.memo)+'</div>';

  if (o.photos && o.photos.length){
    html += '<div class="dt-photos">';
    for (const pid of o.photos){
      html += '<img data-pid="'+esc(pid)+'" alt="사진" onclick="App.openPhoto(\''+c.id+'\',\''+o.id+'\',\''+esc(pid)+'\')" />';
    }
    html += '</div>';
  }

  html += '<input type="file" accept="image/*" multiple id="phd-'+o.id+'" style="display:none" onchange="App.addPhoto(\''+c.id+'\',\''+o.id+'\', this)" />'
    + '<div class="dt-actions">'
    + '<button class="btn-ghost" onclick="document.getElementById(\'phd-'+o.id+'\').click()">＋ 사진 추가</button>'
    + '<button class="btn-ghost" onclick="App.openForm(\''+c.id+'\',\''+o.id+'\')">내용 수정</button>'
    + '<button class="btn-ghost" style="color:var(--danger)" onclick="App.removeOption(\''+c.id+'\',\''+o.id+'\')">삭제</button>'
    + '</div>';

  document.getElementById("detail-inner").innerHTML = html;
  box.style.display = "block";
}

/* ── 액션 ── */
window.App = {
  commas: withCommas,
  setTab(id){ tab = id; formState = null; evFormState = null; render(); window.scrollTo({top:0}); },
  schedMode(m){ schedView = m; render(); },
  calMove(dir){
    let m = calCursor.m + dir, y = calCursor.y;
    if (m < 0){ m = 11; y--; } if (m > 11){ m = 0; y++; }
    calCursor = { y, m }; render();
  },
  calSelect(ds){ selDate = ds; render(); },
  _evTarget: "title",
  evInsertTag(i){
    const name = evTagList[i];
    if (!name) return;
    const el = document.getElementById(this._evTarget === "memo" ? "ev-memo" : "ev-title");
    if (!el) return;
    let v = el.value.replace(/#\s*$/, "");           // 방금 친 # 는 정리
    if (v && !/\s$/.test(v)) v += " ";
    el.value = v + "#" + name + " ";
    el.focus();
  },
  evOpenForm(date, id){
    evFormState = { editingId: id || null, date: date || selDate || todayStr() };
    render();
    setTimeout(()=>document.getElementById("ev-title")?.focus(), 0);
  },
  evCancel(){ evFormState = null; if (pendingRemote){ state = pendingRemote; pendingRemote = null; } render(); },
  evSave(){
    const title = document.getElementById("ev-title").value.trim();
    const date = document.getElementById("ev-date").value;
    if (!title || !date){ document.getElementById("ev-title").focus(); return; }
    const time = document.getElementById("ev-time").value || "";
    const memo = document.getElementById("ev-memo").value.trim();
    state.events = state.events || [];
    if (evFormState.editingId){
      const e = state.events.find(x=>x.id===evFormState.editingId);
      if (e) Object.assign(e, { title, date, time, memo });
    } else {
      state.events.push({ id: uid(), title, date, time, memo, done:false });
    }
    selDate = date;
    calCursor = { y: parseInt(date.slice(0,4),10), m: parseInt(date.slice(5,7),10)-1 };
    evFormState = null; pendingRemote = null; persist(); render();
  },
  /* 순서 변경 */
  reorderOpen(){ reorderMode = true; renderReorder(); },
  reorderDone(){ reorderMode = false; renderReorder(); render(); },
  roMove(id, dir){
    const i = state.categories.findIndex(c=>c.id===id);
    const j = i + dir;
    if (i < 0 || j < 0 || j >= state.categories.length) return;
    const [c] = state.categories.splice(i, 1);
    state.categories.splice(j, 0, c);
    persist(); renderReorder();
  },
  roDown(e, id){
    e.preventDefault();
    const row = e.currentTarget.closest(".ro-row");
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err){}
    this._ro = { id, row, startY: e.clientY, fromIdx: state.categories.findIndex(c=>c.id===id) };
    row.classList.add("dragging");
  },
  roDrag(e){
    const d = this._ro; if (!d) return;
    d.row.style.transform = "translateY(" + (e.clientY - d.startY) + "px)";
  },
  roUp(e){
    const d = this._ro; if (!d) return;
    this._ro = null;
    const rowH = d.row.offsetHeight + 8;
    const shift = Math.round((e.clientY - d.startY) / rowH);
    d.row.classList.remove("dragging");
    d.row.style.transform = "";
    const to = Math.max(0, Math.min(state.categories.length - 1, d.fromIdx + shift));
    if (to !== d.fromIdx){
      const [c] = state.categories.splice(d.fromIdx, 1);
      state.categories.splice(to, 0, c);
      persist();
    }
    renderReorder();
  },
  /* 탭 길게 누르기 */
  tabClick(id){ if (this._lp){ this._lp = false; return; } this.setTab(id); },
  lpStart(){
    clearTimeout(this._lpT);
    this._lpT = setTimeout(()=>{ this._lp = true; App.reorderOpen(); }, 500);
  },
  lpEnd(){ clearTimeout(this._lpT); },
  async backup(){
    toast("백업 만드는 중…");
    const photos = {};
    for (const c of state.categories)
      for (const o of c.options)
        if (o.photos)
          for (const pid of o.photos){
            const v = await photoGet(pid);
            if (v) photos[pid] = v;
          }
    const payload = { app:"wedding-planner", version:1, exportedAt:new Date().toISOString(), state, photos };
    const blob = new Blob([JSON.stringify(payload)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "wedding-backup-" + todayStr().replace(/-/g,"") + ".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
    toast("백업 파일을 내려받았어요");
  },
  async restore(input){
    const f = input.files && input.files[0];
    input.value = "";
    if (!f) return;
    try {
      const p = JSON.parse(await f.text());
      if (!p || p.app !== "wedding-planner" || !p.state || !Array.isArray(p.state.categories)){
        toast("백업 파일 형식이 아니에요"); return;
      }
      if (!confirm("백업 시점의 데이터로 되돌릴까요?\n지금 있는 내용을 백업 파일 내용으로 덮어씁니다.")) return;
      toast("복원 중…");
      if (p.photos)
        for (const pid of Object.keys(p.photos)) await photoSet(pid, p.photos[pid]);
      p.state.events = Array.isArray(p.state.events) ? p.state.events : [];
      state = p.state;
      persist(); render();
      toast("복원했어요");
    } catch(e){ toast("복원에 실패했어요"); }
  },
  evToggle(id){
    const e = (state.events||[]).find(x=>x.id===id);
    if (e){ e.done = !e.done; persist(); render(); }
  },
  evRemove(id){
    if (!confirm("이 일정을 삭제할까요?")) return;
    state.events = (state.events||[]).filter(x=>x.id!==id);
    evFormState = null; persist(); render();
  },
  setDate(v){ state.weddingDate = v; persist(); render(); },
  setBudget(catId, v){
    const c = state.categories.find(x=>x.id===catId);
    c.budgetCap = parsePrice(v);
    persist(); render();
  },
  openDetail(catId, optId){ detailState = { catId, optId }; renderDetail(); hydratePhotos(); },
  closeDetail(){ detailState = null; document.getElementById("detail").style.display = "none"; },
  openForm(catId, optId){ formState = { catId, editingId: optId }; detailState = null;
    document.getElementById("detail").style.display = "none"; render();
    setTimeout(()=>document.getElementById("f-name")?.focus(), 0); },
  cancelForm(){ formState = null; if (pendingRemote){ state = pendingRemote; pendingRemote = null; } render(); },
  saveOption(){
    const name = document.getElementById("f-name").value.trim();
    if (!name){ document.getElementById("f-name").focus(); return; }
    const payload = {
      name,
      price: parsePrice(document.getElementById("f-price").value),
      memo: document.getElementById("f-memo").value.trim(),
      link: document.getElementById("f-link").value.trim(),
    };
    const c = state.categories.find(x=>x.id===formState.catId);
    if (formState.editingId){
      Object.assign(c.options.find(o=>o.id===formState.editingId), payload);
    } else {
      c.options.push({ id: uid(), status: "candidate", ...payload });
    }
    formState = null; pendingRemote = null; persist(); render();
  },
  setStatus(catId, optId, status){
    const o = state.categories.find(x=>x.id===catId).options.find(x=>x.id===optId);
    o.status = (o.status === status) ? "candidate" : status;
    persist(); render();
  },
  removeOption(catId, optId){
    if (!confirm("이 옵션을 삭제할까요?")) return;
    const c = state.categories.find(x=>x.id===catId);
    const o = c.options.find(x=>x.id===optId);
    if (o?.photos) o.photos.forEach(pid=>photoDel(pid));
    c.options = c.options.filter(x=>x.id!==optId);
    persist(); render();
  },
  async addPhoto(catId, optId, input){
    const files = Array.from(input.files || []);
    input.value = "";
    if (!files.length) return;
    const o = state.categories.find(x=>x.id===catId).options.find(x=>x.id===optId);
    o.photos = o.photos || [];
    if (o.photos.length + files.length > MAX_PHOTOS_PER_OPTION){
      toast("사진은 옵션당 최대 "+MAX_PHOTOS_PER_OPTION+"장까지예요");
      files.length = Math.max(0, MAX_PHOTOS_PER_OPTION - o.photos.length);
      if (!files.length) return;
    }
    toast("사진 올리는 중…");
    for (const f of files){
      try {
        const data = await resizeImage(f, 1000, 0.72);
        const pid = "p" + uid();
        const ok = await photoSet(pid, data);
        if (ok) o.photos.push(pid);
        else { toast("사진 업로드에 실패했어요"); return; }
      } catch(e){ toast("사진을 읽지 못했어요"); }
    }
    persist(); render();
  },
  openPhoto(catId, optId, pid){
    this._lb = { catId, optId, pid };
    const lb = document.getElementById("lightbox");
    const img = document.getElementById("lb-img");
    img.src = photoCache[pid] || "";
    if (!photoCache[pid]) photoGet(pid).then(v=>{ if (v) img.src = v; });
    lb.style.display = "flex";
  },
  closePhoto(){
    document.getElementById("lightbox").style.display = "none";
    this._lb = null;
  },
  deletePhoto(){
    if (!this._lb) return;
    if (!confirm("이 사진을 삭제할까요?")) return;
    const { catId, optId, pid } = this._lb;
    const o = state.categories.find(x=>x.id===catId)?.options.find(x=>x.id===optId);
    if (o?.photos) o.photos = o.photos.filter(x=>x!==pid);
    photoDel(pid);
    this.closePhoto();
    persist(); render();
  },
  addCategory(){
    const name = prompt("추가할 항목 이름을 입력하세요");
    if (!name || !name.trim()) return;
    const id = uid();
    state.categories.push({ id, name: name.trim(), budgetCap: null, options: [] });
    tab = id; persist(); render();
  },
  removeCategory(catId){
    const c = state.categories.find(x=>x.id===catId);
    if (!confirm("'"+c.name+"' 항목과 안의 옵션 "+c.options.length+"개를 모두 삭제할까요?")) return;
    c.options.forEach(o=>{ if (o.photos) o.photos.forEach(pid=>photoDel(pid)); });
    state.categories = state.categories.filter(x=>x.id!==catId);
    tab = "summary"; persist(); render();
  },
};

/* ── 초기화 ── */
async function startApp(){
  try {
    const raw = await store.get(KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.categories)){
        parsed.events = Array.isArray(parsed.events) ? parsed.events : [];
        // 마이그레이션: 가전 항목 보장
        if (!parsed.categories.some(c=>c.name==="가전")){
          const idx = parsed.categories.findIndex(c=>c.name==="집 인테리어");
          parsed.categories.splice(idx>=0?idx+1:parsed.categories.length, 0, { id: uid(), name:"가전", budgetCap:null, options:[] });
        }
        state = parsed;
      }
    }
  } catch(e){ /* 첫 실행 */ }
  render();

  /* 실시간 동기화: 상대방이 수정하면 내 화면도 즉시 갱신 */
  if (fbRef){
    fbRef.on("value", (snap)=>{
      const raw = snap.val();
      if (!raw || raw === lastWritten) return;
      try {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.categories)){
          parsed.events = Array.isArray(parsed.events) ? parsed.events : [];
          if (formState || evFormState){ pendingRemote = parsed; }   // 입력 중이면 폼 닫힌 뒤 반영
          else { state = parsed; render(); }
        }
      } catch(e){}
    });
    toast("공유 저장소에 연결됐어요");
  }
}

/* ── 핀번호 게이트 ── */
function connectRoom(room){
  if (FB_ENABLED && typeof firebase !== "undefined"){
    try {
      fbRef = firebase.database().ref("planners/" + room);
      fbPhotos = firebase.database().ref("photos/" + room);
    } catch(e){ console.error(e); }
  }
  document.getElementById("gate").style.display = "none";
  startApp();
}

App.tryPin = async function(){
  const input = document.getElementById("pin-input");
  const err = document.getElementById("pin-err");
  const pin = input.value.trim();
  if (pin.length < 4) return;
  try {
    const v = await sha256hex(PIN_SALT_VERIFY + pin);
    if (v !== PIN_VERIFY_HASH){
      err.textContent = "핀번호가 맞지 않아요";
      input.value = ""; input.focus();
      return;
    }
    const room = "wp-" + (await sha256hex(PIN_SALT_ROOM + pin)).slice(0, 40);
    try { localStorage.setItem("wp-room", room); } catch(e){}
    connectRoom(room);
  } catch(e){
    err.textContent = "이 환경에서는 잠금 해제를 지원하지 않아요";
  }
};

(function boot(){
  let saved = null;
  try { saved = localStorage.getItem("wp-room"); } catch(e){}
  if (saved){
    connectRoom(saved);   // 이 기기에서 이미 인증됨 → 바로 열기
  } else {
    document.getElementById("gate").style.display = "flex";
    setTimeout(()=>document.getElementById("pin-input")?.focus(), 100);
  }
})();

  body{background:var(--bg);color:var(--ink);font-family:&#x27;Apple SD Gothic Neo&#x27;,&#x27;Pretendard&#x27;,&#x27;Noto Sans KR&#x27;,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1280px;margin:0 auto;padding:48px 28px 80px}
  header{text-align:center;margin-bottom:8px}
  .eyebrow{letter-spacing:.35em;font-size:11px;color:var(--gold);text-transform:uppercase;margin-bottom:14px}
  h1{font-size:clamp(28px,4vw,44px);font-weight:800;letter-spacing:-.02em}
  h1 em{font-style:normal;color:var(--gold)}
  .sub{color:var(--sub);margin-top:12px;font-size:14.5px;line-height:1.7}
  .filters{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:30px 0 38px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 18px;font-size:13.5px;color:var(--sub);cursor:pointer;transition:.2s}
  .chip:hover{border-color:var(--gold);color:var(--ink)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  /* masonry */
  .masonry{columns:3 320px;column-gap:22px}
  .card{break-inside:avoid;margin-bottom:22px;background:var(--card);border-radius:18px;overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:transform .25s, box-shadow .25s}
  .card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(60,45,20,.14)}
  .card img{width:100%;display:block;background:#eee}
  .card .body{padding:18px 20px 20px}
  .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;padding:4px 10px;border-radius:999px;color:#fff;margin-bottom:10px}
  .t-paris{background:var(--paris)} .t-nice{background:var(--nice)} .t-dolo{background:var(--dolo)} .t-venice{background:var(--venice)}
  .card h3{font-size:17.5px;font-weight:800;line-height:1.35;margin-bottom:6px}
  .meta{font-size:12px;color:var(--gold);font-weight:700;margin-bottom:9px}
  .card p{font-size:13.5px;color:var(--sub);line-height:1.75}
  .more{display:inline-block;margin-top:12px;font-size:12.5px;font-weight:700;color:var(--ink);border-bottom:1px solid var(--gold);padding-bottom:2px}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(30,24,16,.55);backdrop-filter:blur(6px);display:none;z-index:50;overflow-y:auto;padding:4vh 16px}
  .overlay.open{display:block}
  .sheet{max-width:820px;margin:0 auto;background:var(--card);border-radius:22px;overflow:hidden;animation:pop .28s ease}
  @keyframes pop{from{transform:translateY(24px);opacity:0}to{transform:none;opacity:1}}
  .hero{position:relative}
  .hero img{width:100%;max-height:56vh;object-fit:cover;display:block}
  .hero .shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65),transparent 55%)}
  .hero .titlebox{position:absolute;left:28px;right:28px;bottom:22px;color:#fff}
  .hero .titlebox h2{font-size:clamp(22px,3vw,32px);font-weight:800;text-shadow:0 2px 12px rgba(0,0,0,.4)}
  .hero .titlebox .d{font-size:13px;opacity:.9;margin-top:6px}
  .close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;border:none;font-size:17px;cursor:pointer}
  .content{padding:30px 34px 40px}
  .content .lead{font-size:15.5px;line-height:1.9;color:var(--ink);margin-bottom:24px}
  .content h4{font-size:13px;letter-spacing:.12em;color:var(--gold);font-weight:800;margin:26px 0 12px;text-transform:uppercase}
  .content ul{list-style:none}
  .content li{font-size:14px;line-height:1.85;color:#463f37;padding-left:18px;position:relative;margin-bottom:8px}
  .content li::before{content:&quot;&quot;;position:absolute;left:2px;top:11px;width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .tipbox{background:#f6efe2;border-radius:14px;padding:16px 18px;font-size:13.5px;line-height:1.8;color:#5c5140;margin-top:22px}
  .tipbox b{color:var(--ink)}
  .story{margin-top:26px;padding:20px 22px;border-left:3px solid var(--gold);background:#fbf8f2;border-radius:0 14px 14px 0;font-size:13.5px;line-height:1.9;color:#5c5140;font-style:italic}
  footer{text-align:center;margin-top:56px;color:var(--sub);font-size:12px}
  @media (max-width:720px){ .masonry{columns:2 160px;column-gap:12px} .card .body{padding:12px 14px 14px} .card p{display:none} .content{padding:22px 20px 30px} }

{r:&#x27;nice&#x27;,day:&#x27;D2 · 11/16 (월)&#x27;,t:&#x27;니스 구시가 &amp; 프롬나드 데 장글레&#x27;,img:&#x27;https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Promenade_des_Anglais_Nice_IMG_1255.jpg/1280px-Promenade_des_Anglais_Nice_IMG_1255.jpg&#x27;,

{r:&#x27;nice&#x27;,day:&#x27;D4 · 11/18 (수) 대안&#x27;,t:&#x27;생폴드방스 + 앙티브 피카소 미술관&#x27;,img:&#x27;https://upload.wikimedia.org/wikipedia/commons/8/8b/Saint-Paul-de-Vence_BW_2011-06-09_12-19-00.JPG&#x27;,

function render(f){
  grid.innerHTML=&#x27;&#x27;;

    el.innerHTML=`&lt;img src=&quot;${p.img}&quot; loading=&quot;lazy&quot; alt=&quot;${esc(p.t)}&quot;&gt;&lt;div class=&quot;body&quot;&gt;&lt;span class=&quot;tag ${tags[p.r][0]}&quot;&gt;${tags[p.r][1]}&lt;/span&gt;&lt;div class=&quot;meta&quot;&gt;${esc(p.day)}&lt;/div&gt;&lt;h3&gt;${esc(p.t)}&lt;/h3&gt;&lt;p&gt;${esc(p.lead.length&gt;110?p.lead.slice(0,110)+&#x27;…&#x27;:p.lead)}&lt;/p&gt;&lt;span class=&quot;more&quot;&gt;자세히 보기 →&lt;/span&gt;&lt;/div&gt;`;
    grid.appendChild(el);
  });
}
function openModal(i){
  const p=P[i];
  document.getElementById(&#x27;m-img&#x27;).src=p.img;

  document.getElementById(&#x27;m-day&#x27;).textContent=p.day;

    `&lt;p class=&quot;lead&quot;&gt;${esc(p.lead)}&lt;/p&gt;

<script id="mode-switch-js">
(function(){
  function setMode(m){
    var w=document.getElementById('modeWedding'), h=document.getElementById('modeHoneymoon');
    var bw=document.getElementById('mm-wed'), bh=document.getElementById('mm-hm');
    if(m==='hm'){ w.style.display='none'; h.classList.add('on'); document.body.classList.add('hm-active');
      bh.classList.add('on'); bw.classList.remove('on'); }
    else { h.classList.remove('on'); w.style.display='block'; document.body.classList.remove('hm-active');
      bw.classList.add('on'); bh.classList.remove('on'); window.scrollTo(0,0); }
  }
  window.__setMode=setMode;
})();
</script>
